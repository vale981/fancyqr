<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FancyQR Generator</title>
    <style>
        :root {
            --primary: #ff9232;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #2d3436;
            --border: #dfe6e9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 600px) {
            .card {
                grid-template-columns: 1fr;
            }
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #636e72;
        }

        input, select {
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f0f2f5;
            border-radius: 1rem;
            padding: 1rem;
            min-height: 300px;
            border: 2px dashed var(--border);
        }

        #qr-preview {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
        }

        .actions {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-secondary {
            background-color: #636e72;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        h1 {
            grid-column: 1 / -1;
            margin: 0 0 1rem 0;
            font-size: 1.5rem;
            text-align: center;
            color: var(--primary);
        }

        input[type="range"] {
            padding: 0.5rem 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; grid-column: 1 / -1;">
            <h1 style="margin: 0; text-align: left;">✨ FancyQR Generator</h1>
            <a href="/dashboard" style="font-size: 0.8rem; color: #636e72; text-decoration: none;">Dashboard</a>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="data">Text or URL</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="data" placeholder="Enter text here..." value="https://google.com" style="flex: 1;">
                    <input type="password" id="password" placeholder="Pass" style="width: 80px;">
                    <button class="btn btn-primary" id="shorten-btn" style="padding: 0 1rem; width: auto; font-size: 0.8rem;">Shorten</button>
                </div>
                <div id="short-url-info" style="display: none; margin-top: 0.5rem; font-size: 0.85rem; color: #636e72;">
                    <span id="short-url-display" style="color: var(--primary); font-weight: 600;"></span>
                    <span id="click-count" style="margin-left: 1rem;">Clicks: 0</span>
                    <a id="stats-link" href="#" target="_blank" style="margin-left: 1rem; color: #0984e3; text-decoration: none;">View Stats</a>
                </div>
            </div>

            <div class="control-group">
                <label for="front-color">Foreground Color</label>
                <input type="color" id="front-color" value="#ff9232">
            </div>

            <div class="control-group">
                <label for="back-color">Background Color (Hex)</label>
                <input type="text" id="back-color" value="#ffffff00" placeholder="#RRGGBBAA">
            </div>

            <div class="control-group">
                <label for="error-correction">Error Correction</label>
                <select id="error-correction">
                    <option value="L">Low (7%)</option>
                    <option value="M">Medium (15%)</option>
                    <option value="Q">Quartile (25%)</option>
                    <option value="H">High (30%)</option>
                </select>
            </div>

            <div class="control-group" style="flex-direction: row; align-items: center; gap: 1rem;">
                <input type="checkbox" id="logo" style="width: auto;">
                <label for="logo" style="margin-top: 0.2rem;">Include logo.svg</label>
            </div>

            <div id="logo-controls" style="display: none; flex-direction: column; gap: 1rem;">
                <div class="control-group">
                    <label for="logo-scale">Logo Scale: <span id="ls-val">0.8</span></label>
                    <input type="range" id="logo-scale" min="0.1" max="1.0" step="0.05" value="0.8">
                </div>

                <div class="control-group">
                    <label for="logo-margin">Logo Margin: <span id="lm-val">0.25</span></label>
                    <input type="range" id="logo-margin" min="0.1" max="0.5" step="0.05" value="0.25">
                </div>
            </div>
        </div>

        <div class="preview-side">
            <div class="preview-container" id="container">
                <img id="qr-preview" src="" alt="QR Preview">
            </div>
            
            <div class="actions">
                <button class="btn btn-primary" id="download-btn">Download SVG</button>
            </div>
        </div>
    </div>

    <script>
        const dataInput = document.getElementById('data');
        const passwordInput = document.getElementById('password');
        const shortenBtn = document.getElementById('shorten-btn');
        const shortUrlInfo = document.getElementById('short-url-info');
        const shortUrlDisplay = document.getElementById('short-url-display');
        const clickCount = document.getElementById('click-count');
        const statsLink = document.getElementById('stats-link');
        const frontColorInput = document.getElementById('front-color');
        const backColorInput = document.getElementById('back-color');
        const ecInput = document.getElementById('error-correction');
        const logoInput = document.getElementById('logo');
        const lsInput = document.getElementById('logo-scale');
        const lmInput = document.getElementById('logo-margin');
        const lsVal = document.getElementById('ls-val');
        const lmVal = document.getElementById('lm-val');
        const logoControls = document.getElementById('logo-controls');
        const previewImg = document.getElementById('qr-preview');
        const downloadBtn = document.getElementById('download-btn');

        let debounceTimer;

        function updateQR() {
            const data = encodeURIComponent(dataInput.value || " ");
            const fc = encodeURIComponent(frontColorInput.value);
            const bc = encodeURIComponent(backColorInput.value);
            const ec = ecInput.value;
            const logo = logoInput.checked;
            const ls = lsInput.value;
            const lm = lmInput.value;
            
            lsVal.textContent = ls;
            lmVal.textContent = lm;
            logoControls.style.display = logo ? 'flex' : 'none';
            
            const url = `/generate?data=${data}&fc=${fc}&bc=${bc}&ec=${ec}&logo=${logo}&ls=${ls}&lm=${lm}&size=100`;
            previewImg.src = url;
        }

        function debouncedUpdate() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(updateQR, 300);
        }

        [dataInput, frontColorInput, backColorInput, ecInput, logoInput, lsInput, lmInput].forEach(el => {
            el.addEventListener('input', debouncedUpdate);
        });

        shortenBtn.addEventListener('click', async () => {
            const url = dataInput.value;
            if (!url || !url.startsWith('http')) {
                alert('Please enter a valid URL starting with http:// or https://');
                return;
            }

            shortenBtn.disabled = true;
            shortenBtn.textContent = '...';

            try {
                const response = await fetch('/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        url, 
                        password: passwordInput.value 
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    const shortUrl = `${window.location.origin}/${result.slug}`;
                    const statsUrl = `/stats/${result.slug}${passwordInput.value ? '?password=' + passwordInput.value : ''}`;
                    
                    dataInput.value = shortUrl;
                    shortUrlDisplay.textContent = shortUrl;
                    clickCount.textContent = 'Clicks: 0';
                    statsLink.href = statsUrl;
                    shortUrlInfo.style.display = 'block';
                    
                    updateQR();
                } else {
                    const err = await response.json();
                    alert(`Error: ${err.detail || 'Failed to shorten URL'}`);
                }
            } catch (e) {
                alert('Error connecting to server');
            } finally {
                shortenBtn.disabled = false;
                shortenBtn.textContent = 'Shorten';
            }
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.href = previewImg.src;
            link.download = 'fancy_qr.svg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Initial load
        updateQR();
    </script>
</body>
</html>
